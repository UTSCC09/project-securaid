version: "3.9"

services:
  backend:
    build:
      context: ./server
      dockerfile: backend.dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env.production
    restart: always

  frontend:
    build:
      context: ./client
      dockerfile: frontend.dockerfile
    ports:
      - "80:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://34.130.102.184
